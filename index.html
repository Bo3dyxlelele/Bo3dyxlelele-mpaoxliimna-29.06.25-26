<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>29.06.26 💚</title>
<style>
* {
    box-sizing: border-box;
}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#adffdf;
    color:#017F00;
    text-align:center;
    position:relative;
    padding-bottom: 40px;
}
.section{padding:60px 20px;}

/* ШАПКА С ДАТОЙ И СЧЁТЧИКОМ */
.header-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}
.date-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 0 10px;
}
.date-main {
    font-size: 32px;
    font-weight: bold;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 5px 10px;
    text-align: center;
}
.date-main span {
    display: inline-block;
    white-space: nowrap;
}
.date-sub {
    font-size: 18px;
    color: #017F00;
    opacity: 0.8;
    margin-top: 4px;
}
.counter {
    position: fixed;
    top: 20px;
    right: 25px;
    background: rgba(1, 127, 0, 0.1);
    backdrop-filter: blur(8px);
    padding: 12px 16px;
    border-radius: 20px;
    border: 2px solid #017F00;
    font-size: 14px;
    font-weight: bold;
    color: #017F00;
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    text-align: right;
    line-height: 1.6;
    min-width: 120px;
}
.counter span {
    display: block;
    font-size: 12px;
    font-weight: normal;
    opacity: 0.8;
}

.row{display:flex;justify-content:space-around;flex-wrap:wrap;gap:30px;}
.photo-box img,.center-photo img,.random-photo img{
    width:280px;height:280px;object-fit:cover;border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.2);
}
.center-photo img{width:350px;height:350px;}
.quiz button{
    margin:10px;padding:12px 20px;border:none;border-radius:12px;
    cursor:pointer;font-size:18px;background:#017F00;color:white;
    transition:0.3s;
}
.quiz button:hover{transform:scale(1.05);}
.random-gallery{
    position:relative;
    height:2200px;
}
.random-photo{
    position:absolute;
}
.random-photo img{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.2);
}

/* БЛОК С ЛЕГО КОТЯТАМИ */
.lego-section {
    margin-top: 300px;
    padding: 40px 20px 60px;
}
.lego-title {
    font-size: 28px;
    color: #017F00;
    margin-bottom: 40px;
}
.cat-row {
    display: flex;
    justify-content: center;
    gap: 60px;
    flex-wrap: wrap;
}
.cat-item {
    text-align: center;
}
.cat-item img {
    width: 280px;
    height: 280px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,.2);
}
.cat-item h2 {
    color: #017F00;
    margin-top: 15px;
    font-size: 24px;
}

/* КНОПКА "Я ЛЮБЛЮ ТЕБЯ" */
.love-btn {
    margin-top: 50px;
    padding: 18px 50px;
    font-size: 26px;
    background: #017F00;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 20px rgba(1,127,0,0.3);
}
.love-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 35px rgba(1,127,0,0.5);
}
.love-btn:active {
    transform: scale(0.95);
}

/* АМНЯМ */
.amnyam {
    position: fixed;
    top: 15px;
    left: 20px;
    z-index: 1000;
    cursor: pointer;
    transition: transform 0.2s;
    user-select: none;
    background: transparent;
    font-size: 70px;
    line-height: 1;
}
.amnyam:hover {
    transform: scale(1.15);
}
.amnyam:active {
    transform: scale(0.85);
}
.kiss-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    z-index: 9999;
    animation: kissAnim 1.2s ease forwards;
    pointer-events: none;
}
@keyframes kissAnim {
    0% { transform: translate(-50%, -50%) scale(0.3) rotate(-20deg); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.5) rotate(5deg); opacity: 1; }
    70% { transform: translate(-50%, -50%) scale(1.2) rotate(-3deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
}

/* ===== РАМОЧКА ДЛЯ ОПРОСА ===== */
.quiz-box {
    background: rgba(173, 255, 223, 0.5);
    border: 2px solid #8ae0b5;
    border-radius: 30px;
    padding: 30px 25px;
    max-width: 500px;
    margin: 0 auto;
    backdrop-filter: blur(4px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

/* ===== ЛЕТАЮЩИЕ СЕРДЕЧКИ ===== */
.heart{
    position:fixed;
    color:#ff3366;
    pointer-events:none;
    opacity:0.35;
    font-size:24px;
    animation: flyHeart linear infinite;
    z-index:999;
}
@keyframes flyHeart{
    0%{
        transform:translateY(100vh) translateX(0) rotate(0deg) scale(0.3);
        opacity:0;
    }
    10%{opacity:0.35;}
    90%{opacity:0.35;}
    100%{
        transform:translateY(-10vh) translateX(80px) rotate(720deg) scale(1);
        opacity:0;
    }
}

/* ===== СЕРДЕЧКИ ОТ КНОПКИ ===== */
.heart-burst {
    position: fixed;
    pointer-events: none;
    font-size: 30px;
    z-index: 9999;
    animation: burstHeart 2.2s ease-out forwards;
}
@keyframes burstHeart {
    0% { 
        transform: translate(0, 0) scale(0.5) rotate(0deg); 
        opacity: 1; 
    }
    100% { 
        transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(120deg); 
        opacity: 0; 
    }
}

#siteContent{display:none;}
#login{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;
}
input{
padding:10px;border-radius:10px;border:1px solid #017F00;
}

/* ===== ДОПОЛНИТЕЛЬНЫЙ ДЕКОР ===== */
.sparkle {
    position: fixed;
    color: #ffd700;
    pointer-events: none;
    font-size: 20px;
    animation: sparkleFloat linear infinite;
    opacity: 0.6;
    z-index: 998;
}
@keyframes sparkleFloat {
    0% {
        transform: translateY(100vh) rotate(0deg) scale(0);
        opacity: 0;
    }
    20% { opacity: 0.6; }
    80% { opacity: 0.6; }
    100% {
        transform: translateY(-10vh) rotate(360deg) scale(1);
        opacity: 0;
    }
}

/* Анимация для "^^" */
.big-text {
    font-size: 60px;
    animation: bounce 1.5s ease infinite;
    display: inline-block;
}
@keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

/* ===== СТИЛИ ДЛЯ ТЕСТА ===== */
.test-container {
    margin-top: 30px;
    padding: 20px;
    background: rgba(173, 255, 223, 0.3);
    border-radius: 30px;
    border: 2px solid #8ae0b5;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
}
.test-question {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #017F00;
}
.test-progress {
    font-size: 16px;
    opacity: 0.8;
    margin-bottom: 15px;
}
.test-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
}
.test-options button {
    padding: 14px;
    border: 2px solid #017F00;
    border-radius: 16px;
    background: white;
    color: #017F00;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
}
.test-options button:hover {
    background: #017F00;
    color: white;
}
.test-options button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
.test-options button.correct {
    background: #2ecc71;
    color: white;
    border-color: #2ecc71;
}
.test-options button.wrong {
    background: #e74c3c;
    color: white;
    border-color: #e74c3c;
}
.test-feedback {
    font-size: 28px;
    margin: 10px 0;
}
.test-next {
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: #017F00;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}
.test-next:hover {
    transform: scale(1.05);
}
.test-next:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.test-result {
    font-size: 24px;
    font-weight: bold;
    margin-top: 20px;
}
.test-result-details {
    text-align: left;
    max-width: 400px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 20px;
    border: 2px solid #8ae0b5;
}
.test-result-details div {
    padding: 8px 0;
    border-bottom: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
}
.test-result-details div:last-child {
    border-bottom: none;
}
.hidden {
    display: none;
}
.test-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    margin-top: 20px;
}
.test-buttons button {
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: #017F00;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
    max-width: 300px;
}
.test-buttons button:hover {
    transform: scale(1.05);
}
.test-buttons button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
</style>
</head>
<body>

<!-- АМНЯМ -->
<div class="amnyam" id="amnyam" onclick="clickAmnyam()">🍀</div>

<!-- СЧЁТЧИК (ТОЛЬКО ВЕРХНЯЯ СТРОКА) -->
<div class="counter" id="counter">
    <span id="counterDays">Загрузка...</span>
</div>

<div id="login">

<input type="password" id="pass">

</div>

<div id="siteContent">

<!-- ДАТА -->
<div class="section header-section">
    <div class="date-wrapper">
        <div class="date-main">
            <span>29.06.26</span>
            <span style="font-size:24px; opacity:0.7;">| 00:24</span>
        </div>
        <div class="date-sub">год наших отношений</div>
    </div>
</div>

<!-- ФОТКИ -->
<div class="section row">
<div class="photo-box">
<img src="me.jpg" alt="Я">
<h2>это я</h2>
</div>
<div class="photo-box">
<img src="him.jpg" alt="Ты">

</div>
</div>

        <h2 id="question">ты знаешь что за дата 29.06.26?</h2>

</div>

<!-- ГАЛЕРЕЯ ФОТО -->
<div class="random-gallery">
    <div class="random-photo" style="top:100px;left:5%;"><img src="photo1.jpg"></div>
    <div class="random-photo" style="top:280px;right:8%;"><img src="photo2.jpg"></div>
    <div class="random-photo" style="top:500px;left:20%;"><img src="photo3.jpg"></div>
    <div class="random-photo" style="top:750px;right:12%;"><img src="photo4.jpg"></div>
    <div class="random-photo" style="top:1000px;left:30%;"><img src="photo5.jpg"></div>
    <div class="random-photo" style="top:1250px;right:20%;"><img src="photo6.jpg"></div>
    <div class="random-photo" style="top:1450px;left:8%;"><img src="photo7.jpg"></div>
    <div class="random-photo" style="top:1650px;right:30%;"><img src="photo8.jpg"></div>
    <div class="random-photo" style="top:1850px;left:40%;"><img src="photo9.jpg"></div>
    <div class="random-photo" style="top:2050px;right:5%;"><img src="photo10.jpg"></div>
</div>

<!-- КОТЯТА + КНОПКА -->
<div class="lego-section">
    <h2 class="lego-title">наши лего котята</h2>
    <div class="cat-row">
        <div class="cat-item">
            <img src="my_cat.jpg" alt="Мой котик">
            <h2>мой котик</h2>
        </div>
        <div class="cat-item">
            <img src="your_cat.jpg" alt="Твой котик">
            <h2>твой котик</h2>
        </div>
    </div>
    <button class="love-btn" onclick="startTest()">я люблю тебя 💚</button>
</div>

<!-- КОНТЕЙНЕР ДЛЯ ТЕСТА -->
<div id="testContainer" class="test-container hidden">
    <div id="testQuestion" class="test-question"></div>
    <div id="testProgress" class="test-progress"></div>
    <div id="testOptions" class="test-options"></div>
    <div id="testFeedback" class="test-feedback"></div>
    <button id="testNextBtn" class="test-next" disabled>следующий вопрос</button>
    <div id="testResult" class="test-result hidden"></div>
    <div id="testResultDetails" class="test-result-details hidden"></div>
    <div id="testButtons" class="test-buttons hidden">
        <button id="resetBtn" onclick="resetTest()" disabled>пройти заново</button>
        <button id="shareBtn" onclick="shareResult()" disabled>поделиться результатами</button>
    </div>
</div>

</div>

<script>
// ===== ПАРОЛЬ =====
function checkPass(){
const p=document.getElementById("pass").value;
if(p==="14053011290625"){
document.getElementById("login").style.display="none";
document.getElementById("siteContent").style.display="block";
startCounter();
setInterval(startCounter, 10000);
}else{
document.getElementById("wrong").innerText="Неверный пароль";
}
}

// ===== СЧЁТЧИК (ТОЛЬКО ВЕРХНЯЯ СТРОКА, БЕЗ НИЖНЕЙ) =====
function startCounter() {
    const start = new Date('2025-06-29T00:24:00');
    const now = new Date();
    const diffMs = now - start;
    const daysTotal = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    const hours = String(Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
    const minutes = String(Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
    document.getElementById('counterDays').innerHTML = `${daysTotal} дн. ${hours} ч. ${minutes} мин.`;
}

// ===== АМНЯМ =====
let amnyamClicks = 0;
function clickAmnyam() {
    amnyamClicks++;
    if (amnyamClicks >= 6) {
        amnyamClicks = 0;
        showKiss();
    }
}
function showKiss() {
    const kiss = document.createElement('div');
    kiss.className = 'kiss-popup';
    kiss.textContent = '😘❤️';
    document.body.appendChild(kiss);
    setTimeout(() => kiss.remove(), 1300);
}

// ===== ОПРОС =====
function answerNo(){
document.getElementById("question").innerText="НЕТ, ТЫ ЗНАЕШЬ!";
document.getElementById("answers").innerHTML=`
<button onclick="resetQuiz()">да, знаю</button>
<button onclick="resetQuiz()">знаю</button>
`;
}
function answerYes(){
document.getElementById("question").innerText="а что это за дата?";
document.getElementById("answers").innerHTML=`
<button onclick="finalAnswer()">год наших отношений</button>
<button onclick="finalAnswer()">годик наших отношений</button>
`;
}
function finalAnswer(){
document.getElementById("question").innerHTML="даа!! ты угадал! я люблю тебя!";
document.getElementById("answers").innerHTML=`
<button onclick="showLove()">я тебя тоже люблю</button>
`;
}
function showLove(){
document.getElementById("question").innerHTML="<span class='big-text'>^^</span>";
document.getElementById("answers").innerHTML=`
<button onclick="resetQuiz()" style="background:#017F00;">^^</button>
`;
}
function resetQuiz(){
document.getElementById("question").innerText="ты знаешь что за дата 29.06.26?";
document.getElementById("answers").innerHTML=`
<button onclick="answerNo()">нет</button>
<button onclick="answerYes()">да</button>
`;
}

// ===== ТЕСТ =====
const testQuestions = [
    { question: "мой любимый цвет", options: ["зеленый", "желтый"], correct: 0 },
    { question: "какой чай я пью", options: ["с сахаром", "без сахара"], correct: 1 },
    { question: "мои любимые месяца", options: ["май-август", "сентябрь-октябрь", "декабрь-март", "апрель"], correct: 0 },
    { question: "мои самые любимые мягкие игрушки?", options: ["пушок", "пушок и зайчик клубничка", "зайчик клубничка", "акула и пушок", "кот батон и акула", "кот батон пушок"], correct: 1 },
    { question: "как я сплю?", options: ["на животе", "на боку", "на спине", "как получится"], correct: 0 },
    { question: "чего я боюсь", options: ["ездить на лифте", "летать на самолёте", "глотать таблетки", "когда кричат"], correct: 3 },
    { question: "что я не люблю из напитков", options: ["воду", "газированную воду", "чай", "компот", "кисель"], correct: 1 }
];

let currentQuestion = 0;
let answers = [];
let testStarted = false;
let testFinished = false;

function startTest() {
    if (testStarted) return;
    testStarted = true;
    testFinished = false;
    document.getElementById('testContainer').classList.remove('hidden');
    document.getElementById('testResult').classList.add('hidden');
    document.getElementById('testResultDetails').classList.add('hidden');
    document.getElementById('testButtons').classList.add('hidden');
    document.getElementById('testNextBtn').classList.remove('hidden');
    document.getElementById('resetBtn').disabled = true;
    document.getElementById('shareBtn').disabled = true;
    currentQuestion = 0;
    answers = [];
    showQuestion();
}

function showQuestion() {
    const q = testQuestions[currentQuestion];
    document.getElementById('testQuestion').innerText = q.question;
    document.getElementById('testProgress').innerText = `Вопрос ${currentQuestion+1} из ${testQuestions.length}`;
    const container = document.getElementById('testOptions');
    container.innerHTML = '';
    q.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.dataset.index = index;
        btn.onclick = () => selectAnswer(index);
        container.appendChild(btn);
    });
    document.getElementById('testFeedback').innerHTML = '';
    document.getElementById('testNextBtn').disabled = true;
}

function selectAnswer(index) {
    const q = testQuestions[currentQuestion];
    const buttons = document.querySelectorAll('#testOptions button');
    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) btn.classList.add('correct');
        if (i === index && i !== q.correct) btn.classList.add('wrong');
    });
    const isCorrect = (index === q.correct);
    answers.push({
        question: q.question,
        selected: q.options[index],
        correct: isCorrect
    });
    document.getElementById('testFeedback').innerHTML = isCorrect ? '✅' : '❌';
    document.getElementById('testNextBtn').disabled = false;
}

document.getElementById('testNextBtn').addEventListener('click', function() {
    currentQuestion++;
    if (currentQuestion < testQuestions.length) {
        showQuestion();
        document.getElementById('testResult').classList.add('hidden');
        document.getElementById('testResultDetails').classList.add('hidden');
        document.getElementById('testButtons').classList.add('hidden');
        document.getElementById('resetBtn').disabled = true;
        document.getElementById('shareBtn').disabled = true;
    } else {
        showResult();
    }
});

function showResult() {
    testFinished = true;
    document.getElementById('testQuestion').innerHTML = '';
    document.getElementById('testProgress').innerHTML = '';
    document.getElementById('testOptions').innerHTML = '';
    document.getElementById('testFeedback').innerHTML = '';
    document.getElementById('testNextBtn').classList.add('hidden');
    const total = answers.length;
    const correct = answers.filter(a => a.correct).length;
    const percent = Math.round((correct / total) * 100);
    document.getElementById('testResult').classList.remove('hidden');
    document.getElementById('testResult').innerHTML = `Ты знаешь меня на ${percent}% (${correct}/${total}) 💚`;
    const details = document.getElementById('testResultDetails');
    details.classList.remove('hidden');
    details.innerHTML = answers.map((a, i) => {
        const icon = a.correct ? '✅' : '❌';
        return `<div><span>${i+1}. ${a.question}</span><span>${a.selected} ${icon}</span></div>`;
    }).join('');
    document.getElementById('testButtons').classList.remove('hidden');
    document.getElementById('resetBtn').disabled = false;
    document.getElementById('shareBtn').disabled = false;
}

function resetTest() {
    testStarted = false;
    testFinished = false;
    document.getElementById('testContainer').classList.add('hidden');
    document.getElementById('testResult').classList.add('hidden');
    document.getElementById('testResultDetails').classList.add('hidden');
    document.getElementById('testButtons').classList.add('hidden');
    document.getElementById('testNextBtn').classList.remove('hidden');
    document.getElementById('resetBtn').disabled = true;
    document.getElementById('shareBtn').disabled = true;
    startTest();
}

function shareResult() {
    const total = answers.length;
    const correct = answers.filter(a => a.correct).length;
    const percent = Math.round((correct / total) * 100);
    let text = `Тест пройден на ${percent}% (${correct}/${total})\n\n`;
    answers.forEach((a, i) => {
        const icon = a.correct ? '✅' : '❌';
        text += `${i+1}. ${a.question} → ${a.selected} ${icon}\n`;
    });
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
            alert('Результат скопирован в буфер обмена! Вставь его в сообщение.');
        }).catch(() => {
            alert('Не удалось скопировать. Попробуй выделить результат вручную.');
        });
    } else {
        alert('Ваш браузер не поддерживает копирование. Попробуй выделить результат вручную.');
    }
}

// ===== ВЗРЫВ СЕРДЕЧЕК =====
function burstHearts(event) {
    const btn = event.target;
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const hearts = ['🩷', '💚'];
    for (let i = 0; i < 45; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-burst';
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = cx + 'px';
        heart.style.top = cy + 'px';
        heart.style.fontSize = (24 + Math.random() * 40) + 'px';
        const angle = Math.random() * 360;
        const distance = 150 + Math.random() * 350;
        heart.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
        heart.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
        heart.style.animationDuration = (1.8 + Math.random() * 1.2) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3500);
    }
}
